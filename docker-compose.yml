services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: placesos
      POSTGRES_USER: placesos
      POSTGRES_PASSWORD: placesos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U placesos -d placesos"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: development
      API_PORT: 4000
      DATABASE_URL: postgresql://placesos:placesos@postgres:5432/placesos
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
